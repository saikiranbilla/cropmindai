<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320">
  <!-- Base field -->
  <rect width="1200" height="320" fill="#141e0e"/>

  <!-- Crop rows — E-W running, top-down perspective -->
  <defs>
    <pattern id="fieldrows" x="0" y="0" width="1200" height="22" patternUnits="userSpaceOnUse">
      <rect x="0" y="0"  width="1200" height="14" fill="#243c18"/>
      <rect x="0" y="14" width="1200" height="8"  fill="#162110"/>
    </pattern>
  </defs>
  <rect width="1200" height="320" fill="url(#fieldrows)"/>

  <!-- North parcel (top strip) — slightly different green -->
  <rect x="0" y="0" width="1200" height="90" fill="rgba(32,52,22,0.45)"/>

  <!-- South parcel boundary shade -->
  <rect x="0" y="240" width="1200" height="80" fill="rgba(20,34,14,0.40)"/>

  <!-- Main flood basin (center-left) -->
  <ellipse cx="340" cy="195" rx="220" ry="130" fill="rgba(8,25,80,0.80)"/>
  <ellipse cx="328" cy="188" rx="175" ry="102" fill="rgba(16,48,148,0.72)"/>
  <ellipse cx="318" cy="182" rx="128" ry="76"  fill="rgba(26,68,190,0.64)"/>
  <ellipse cx="310" cy="178" rx="85"  ry="52"  fill="rgba(36,90,220,0.58)"/>
  <!-- Water surface reflection -->
  <ellipse cx="292" cy="168" rx="55"  ry="32"  fill="rgba(96,165,250,0.22)"/>
  <ellipse cx="330" cy="188" rx="38"  ry="22"  fill="rgba(96,165,250,0.14)"/>

  <!-- Saturated margin -->
  <ellipse cx="340" cy="195" rx="270" ry="158" fill="rgba(6,18,60,0.32)"/>

  <!-- Secondary drainage channel running south -->
  <ellipse cx="340" cy="290" rx="32" ry="70"   fill="rgba(14,42,120,0.55)"/>

  <!-- NW small hollow -->
  <ellipse cx="88"  cy="72"  rx="60"  ry="40"  fill="rgba(12,36,110,0.50)"/>
  <ellipse cx="82"  cy="68"  rx="40"  ry="28"  fill="rgba(20,58,160,0.44)"/>

  <!-- East healthy crop zone — brighter green tint -->
  <rect x="720" y="0" width="480" height="320" fill="rgba(40,70,20,0.22)"/>

  <!-- GPS analysis grid -->
  <g stroke="rgba(74,222,128,0.18)" stroke-width="0.8" fill="none">
    <line x1="0"    y1="80"  x2="1200" y2="80"/>
    <line x1="0"    y1="160" x2="1200" y2="160"/>
    <line x1="0"    y1="240" x2="1200" y2="240"/>
    <line x1="300"  y1="0"   x2="300"  y2="320"/>
    <line x1="600"  y1="0"   x2="600"  y2="320"/>
    <line x1="900"  y1="0"   x2="900"  y2="320"/>
  </g>

  <!-- Parcel divider lines (neon emerald, bright) -->
  <line x1="0" y1="90"  x2="1200" y2="90"  stroke="rgba(16,185,129,0.55)" stroke-width="1.5" stroke-dasharray="12,8"/>
  <line x1="0" y1="240" x2="520"  y2="240" stroke="rgba(6,182,212,0.50)"  stroke-width="1.5" stroke-dasharray="12,8"/>

  <!-- Scouting point markers -->
  <!-- PT-001 basin severe -->
  <circle cx="320" cy="182" r="10" fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="320" cy="182" r="3.5" fill="#ef4444"/>
  <line x1="320" y1="172" x2="320" y2="148" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="262" y="136" width="116" height="12" fill="rgba(0,0,0,0.75)" rx="2"/>
  <text x="320" y="146" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">PT-001 · SEVERE POOL</text>

  <!-- PT-002 NW hollow moderate -->
  <circle cx="86"  cy="68"  r="8"  fill="none" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="86"  cy="68"  r="2.5" fill="#f59e0b"/>
  <line x1="86" y1="60" x2="86" y2="40" stroke="#f59e0b" stroke-width="1.5"/>
  <rect x="36" y="29" width="102" height="11" fill="rgba(0,0,0,0.75)" rx="2"/>
  <text x="87" y="39" fill="#f59e0b" font-family="monospace" font-size="8" text-anchor="middle">PT-002 · WATERLOG</text>

  <!-- PT-003 east ridge healthy -->
  <circle cx="980" cy="130" r="8"  fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="980" cy="130" r="2.5" fill="#22c55e"/>
  <line x1="980" y1="122" x2="980" y2="100" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="926" y="88"  width="108" height="11" fill="rgba(0,0,0,0.75)" rx="2"/>
  <text x="980" y="98"  fill="#22c55e" font-family="monospace" font-size="8" text-anchor="middle">PT-003 · DRY RIDGE</text>

  <!-- PT-004 sensor -->
  <circle cx="680" cy="220" r="7"  fill="none" stroke="#06b6d4" stroke-width="2"/>
  <circle cx="680" cy="220" r="2.5" fill="#06b6d4"/>

  <!-- North parcel label -->
  <rect x="460" y="12" width="280" height="26" fill="rgba(0,0,0,0.70)" rx="4"/>
  <text x="600" y="22" fill="#a855f7" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">NORTH PARCEL · ~49 ACRES</text>
  <text x="600" y="33" fill="#7c3aed" font-family="monospace" font-size="7" text-anchor="middle">LAT 40.112°N — PRIMARILY DRY</text>

  <!-- Central parcel label -->
  <rect x="430" y="178" width="240" height="26" fill="rgba(0,0,0,0.70)" rx="4"/>
  <text x="550" y="188" fill="#10b981" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">CENTRAL · ~55 ACRES</text>
  <text x="550" y="199" fill="#059669" font-family="monospace" font-size="7" text-anchor="middle">ACTIVE FLOOD ZONE</text>

  <!-- South parcel label -->
  <rect x="430" y="258" width="240" height="26" fill="rgba(0,0,0,0.70)" rx="4"/>
  <text x="550" y="268" fill="#f59e0b" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">SOUTH PARCEL · ~45 ACRES</text>
  <text x="550" y="279" fill="#d97706" font-family="monospace" font-size="7" text-anchor="middle">WATERLOGGED MARGIN</text>

  <!-- Header HUD -->
  <rect x="0" y="0" width="1200" height="36" fill="rgba(0,0,0,0.82)"/>
  <text x="16" y="14" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">DRONE SURVEY · FIELD UNIT 004 · CHAMPAIGN COUNTY, IL</text>
  <text x="16" y="28" fill="#4ade80" font-family="monospace" font-size="8">CENTROID: 40.1105°N, 88.2401°W · TOTAL: ~149 ACRES · 2026-03-07 09:48 CST</text>
  <text x="1184" y="14" fill="#60a5fa" font-family="monospace" font-size="8" text-anchor="end">ALT: 122m AGL</text>
  <text x="1184" y="28" fill="#60a5fa" font-family="monospace" font-size="8" text-anchor="end">GSD: 3.2 cm/px</text>

  <!-- Scale bar -->
  <line x1="1000" y1="300" x2="1160" y2="300" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="1000" y1="295" x2="1000" y2="305" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="1160" y1="295" x2="1160" y2="305" stroke="#f1f5f9" stroke-width="1.5"/>
  <text x="1080" y="315" fill="#f1f5f9" font-family="monospace" font-size="8" text-anchor="middle">250 m</text>
</svg>
