<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Base soil/field color -->
  <rect width="800" height="600" fill="#1a2410"/>

  <!-- Crop row pattern (N-S running rows, 18px pitch) -->
  <defs>
    <pattern id="croprows" x="0" y="0" width="18" height="600" patternUnits="userSpaceOnUse">
      <rect x="0"  y="0" width="11" height="600" fill="#243c18"/>
      <rect x="11" y="0" width="7"  height="600" fill="#162110"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#croprows)"/>

  <!-- Saturated / waterlogged margin ring -->
  <ellipse cx="310" cy="380" rx="240" ry="168" fill="rgba(8,25,70,0.40)"/>

  <!-- Main flood pool -->
  <ellipse cx="310" cy="380" rx="200" ry="140" fill="rgba(14,42,128,0.80)"/>
  <ellipse cx="302" cy="372" rx="158" ry="108" fill="rgba(22,60,170,0.70)"/>
  <ellipse cx="296" cy="366" rx="116" ry="80"  fill="rgba(30,82,200,0.60)"/>

  <!-- Water surface reflections -->
  <ellipse cx="276" cy="350" rx="72" ry="42" fill="rgba(96,165,250,0.22)"/>
  <ellipse cx="318" cy="374" rx="52" ry="28" fill="rgba(96,165,250,0.16)"/>
  <ellipse cx="290" cy="390" rx="38" ry="18" fill="rgba(147,197,253,0.12)"/>

  <!-- Secondary drainage gully running south -->
  <ellipse cx="310" cy="510" rx="28" ry="80"  fill="rgba(14,42,128,0.55)"/>
  <ellipse cx="310" cy="520" rx="18" ry="70"  fill="rgba(22,60,170,0.45)"/>

  <!-- GPS/scan grid overlay -->
  <g stroke="rgba(74,222,128,0.20)" stroke-width="0.8" fill="none">
    <line x1="0"   y1="150" x2="800" y2="150"/>
    <line x1="0"   y1="300" x2="800" y2="300"/>
    <line x1="0"   y1="450" x2="800" y2="450"/>
    <line x1="200" y1="0"   x2="200" y2="600"/>
    <line x1="400" y1="0"   x2="400" y2="600"/>
    <line x1="600" y1="0"   x2="600" y2="600"/>
  </g>

  <!-- Scouting point — basin (red, severe) -->
  <circle cx="310" cy="380" r="9"  fill="none" stroke="#ef4444" stroke-width="2.5"/>
  <circle cx="310" cy="380" r="3"  fill="#ef4444"/>
  <line x1="310" y1="371" x2="310" y2="334" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="246" y="320" width="130" height="13" fill="rgba(0,0,0,0.72)" rx="2"/>
  <text x="311" y="331" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">PT-001 · SEVERE POOL</text>

  <!-- Scouting point — ridge (green, low) -->
  <circle cx="580" cy="180" r="8"  fill="none" stroke="#22c55e" stroke-width="2"/>
  <circle cx="580" cy="180" r="3"  fill="#22c55e"/>
  <line x1="580" y1="172" x2="580" y2="148" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="524" y="136" width="114" height="12" fill="rgba(0,0,0,0.72)" rx="2"/>
  <text x="581" y="146" fill="#22c55e" font-family="monospace" font-size="9" text-anchor="middle">PT-002 · DRY RIDGE</text>

  <!-- Flooded area label -->
  <rect x="62" y="308" width="142" height="28" fill="rgba(0,0,0,0.78)" rx="3"/>
  <text x="133" y="321" fill="#60a5fa" font-family="monospace" font-size="9" text-anchor="middle">ACTIVE INUNDATION</text>
  <text x="133" y="333" fill="#94a3b8" font-family="monospace" font-size="8" text-anchor="middle">~18.4 ACRES · 218.0m ASL</text>
  <line x1="204" y1="326" x2="244" y2="360" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="800" height="44" fill="rgba(0,0,0,0.80)"/>
  <text x="12" y="16" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">DRONE SURVEY · UNIT 004 · CHAMPAIGN CO, IL</text>
  <text x="12" y="32" fill="#4ade80" font-family="monospace" font-size="8">LAT: 40.1098  LNG: -88.2410  ALT: 122m AGL  2026-03-07 10:15</text>

  <!-- Scale bar -->
  <line x1="620" y1="572" x2="740" y2="572" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="620" y1="568" x2="620" y2="576" stroke="#f1f5f9" stroke-width="1.5"/>
  <line x1="740" y1="568" x2="740" y2="576" stroke="#f1f5f9" stroke-width="1.5"/>
  <text x="680" y="588" fill="#f1f5f9" font-family="monospace" font-size="8" text-anchor="middle">100 m</text>
</svg>
