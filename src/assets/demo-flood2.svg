<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Sky — overcast -->
  <rect width="800" height="220" fill="#0e1820"/>
  <rect width="800" y="220" height="380" fill="#141e0e"/>

  <!-- Cloud layer -->
  <ellipse cx="120" cy="80"  rx="140" ry="55" fill="#1a2535" opacity="0.9"/>
  <ellipse cx="300" cy="60"  rx="200" ry="65" fill="#1c2a3c" opacity="0.9"/>
  <ellipse cx="520" cy="75"  rx="160" ry="58" fill="#1a2535" opacity="0.9"/>
  <ellipse cx="700" cy="55"  rx="130" ry="50" fill="#1c2a3c" opacity="0.9"/>
  <ellipse cx="200" cy="110" rx="110" ry="42" fill="#212f40" opacity="0.8"/>
  <ellipse cx="440" cy="100" rx="180" ry="50" fill="#212f40" opacity="0.8"/>
  <ellipse cx="680" cy="105" rx="120" ry="45" fill="#212f40" opacity="0.8"/>

  <!-- Horizon line / sky-ground boundary -->
  <rect x="0" y="215" width="800" height="6" fill="#1e2c14" opacity="0.7"/>

  <!-- Ground — muddy field base -->
  <rect x="0" y="221" width="800" height="379" fill="#1e2c14"/>

  <!-- Crop rows — perspective-foreshortened, 28 rows, converging toward horizon -->
  <!-- Row spacing increases toward bottom (perspective) -->
  <!-- Each row: dark strip (soil between rows) + slightly lighter strip (corn base) -->
  <g>
    <!-- Far rows (narrow near horizon) -->
    <rect x="0" y="225" width="800" height="3"  fill="#283818" opacity="0.9"/>
    <rect x="0" y="231" width="800" height="3"  fill="#283818" opacity="0.9"/>
    <rect x="0" y="238" width="800" height="4"  fill="#2d3e1c"/>
    <rect x="0" y="246" width="800" height="4"  fill="#2d3e1c"/>
    <rect x="0" y="254" width="800" height="5"  fill="#303f1e"/>
    <rect x="0" y="263" width="800" height="5"  fill="#303f1e"/>
    <rect x="0" y="273" width="800" height="6"  fill="#324220"/>
    <rect x="0" y="284" width="800" height="6"  fill="#324220"/>
    <rect x="0" y="295" width="800" height="7"  fill="#354522"/>
    <rect x="0" y="307" width="800" height="7"  fill="#354522"/>
    <rect x="0" y="320" width="800" height="8"  fill="#384824"/>
    <rect x="0" y="334" width="800" height="9"  fill="#384824"/>
    <rect x="0" y="349" width="800" height="10" fill="#3a4a26"/>
    <rect x="0" y="365" width="800" height="11" fill="#3a4a26"/>
    <rect x="0" y="383" width="800" height="12" fill="#3c4c28"/>
    <rect x="0" y="402" width="800" height="13" fill="#3c4c28"/>
    <rect x="0" y="423" width="800" height="14" fill="#3e4e2a"/>
    <rect x="0" y="445" width="800" height="15" fill="#3e4e2a"/>
    <rect x="0" y="469" width="800" height="17" fill="#405028"/>
    <rect x="0" y="500" width="800" height="19" fill="#405028"/>
    <rect x="0" y="534" width="800" height="21" fill="#425229"/>
    <rect x="0" y="571" width="800" height="29" fill="#425229"/>
  </g>

  <!-- Between-row standing water — blue-grey strips, perspective -->
  <g fill="rgba(20,50,140,0.55)">
    <rect x="0" y="228" width="800" height="2"/>
    <rect x="0" y="234" width="800" height="2"/>
    <rect x="0" y="241" width="800" height="3"/>
    <rect x="0" y="249" width="800" height="3"/>
    <rect x="0" y="258" width="800" height="3"/>
    <rect x="0" y="268" width="800" height="4"/>
    <rect x="0" y="278" width="800" height="4"/>
    <rect x="0" y="289" width="800" height="5"/>
    <rect x="0" y="301" width="800" height="5"/>
    <rect x="0" y="313" width="800" height="6"/>
    <rect x="0" y="327" width="800" height="6"/>
    <rect x="0" y="342" width="800" height="7"/>
    <rect x="0" y="358" width="800" height="8"/>
    <rect x="0" y="375" width="800" height="9"/>
    <rect x="0" y="394" width="800" height="10"/>
    <rect x="0" y="415" width="800" height="11"/>
    <rect x="0" y="438" width="800" height="12"/>
    <rect x="0" y="462" width="800" height="14"/>
    <rect x="0" y="489" width="800" height="16"/>
    <rect x="0" y="521" width="800" height="18"/>
    <rect x="0" y="557" width="800" height="20"/>
  </g>

  <!-- Water surface highlights (sky reflections in puddles) -->
  <g fill="rgba(96,165,250,0.18)">
    <rect x="0" y="289" width="800" height="2"/>
    <rect x="0" y="327" width="800" height="3"/>
    <rect x="0" y="375" width="800" height="3"/>
    <rect x="0" y="438" width="800" height="4"/>
    <rect x="0" y="521" width="800" height="5"/>
  </g>

  <!-- Corn/crop stubble vertical marks (near rows) -->
  <g stroke="#4a6030" stroke-width="1.5" opacity="0.6">
    <line x1="60"  y1="349" x2="60"  y2="320"/>
    <line x1="130" y1="349" x2="130" y2="318"/>
    <line x1="200" y1="349" x2="200" y2="316"/>
    <line x1="270" y1="349" x2="270" y2="318"/>
    <line x1="340" y1="349" x2="340" y2="316"/>
    <line x1="410" y1="349" x2="410" y2="318"/>
    <line x1="480" y1="349" x2="480" y2="320"/>
    <line x1="550" y1="349" x2="550" y2="316"/>
    <line x1="620" y1="349" x2="620" y2="318"/>
    <line x1="690" y1="349" x2="690" y2="320"/>
    <line x1="760" y1="349" x2="760" y2="318"/>
  </g>
  <g stroke="#4a6030" stroke-width="2" opacity="0.5">
    <line x1="40"  y1="415" x2="40"  y2="374"/>
    <line x1="150" y1="415" x2="150" y2="372"/>
    <line x1="260" y1="415" x2="260" y2="370"/>
    <line x1="370" y1="415" x2="370" y2="373"/>
    <line x1="480" y1="415" x2="480" y2="370"/>
    <line x1="590" y1="415" x2="590" y2="372"/>
    <line x1="700" y1="415" x2="700" y2="370"/>
    <line x1="785" y1="415" x2="785" y2="374"/>
  </g>

  <!-- HUD overlay — header -->
  <rect x="0" y="0" width="800" height="42" fill="rgba(0,0,0,0.78)"/>
  <text x="12" y="16" fill="#4ade80" font-family="monospace" font-size="10" font-weight="bold">FIELD SCOUT · UNIT 004 · CHAMPAIGN CO, IL</text>
  <text x="12" y="32" fill="#4ade80" font-family="monospace" font-size="8">LAT: 40.1112  LNG: -88.2395  ELEV: 219.8m ASL  2026-03-07 10:30</text>

  <!-- Soil moisture readout bottom-right -->
  <rect x="582" y="522" width="206" height="52" fill="rgba(0,0,0,0.80)" rx="4"/>
  <text x="598" y="539" fill="#94a3b8" font-family="monospace" font-size="8">SOIL MOISTURE (0–7cm)</text>
  <text x="598" y="558" fill="#60a5fa" font-family="monospace" font-size="20" font-weight="bold">0.42 <tspan font-size="11" fill="#64748b">m³/m³</tspan></text>
  <text x="598" y="570" fill="#f59e0b" font-family="monospace" font-size="8">SATURATION: HIGH</text>

  <!-- Stand loss indicator bottom-left -->
  <rect x="12" y="522" width="180" height="52" fill="rgba(0,0,0,0.80)" rx="4"/>
  <text x="28" y="539" fill="#94a3b8" font-family="monospace" font-size="8">EST. STAND LOSS</text>
  <text x="28" y="558" fill="#ef4444" font-family="monospace" font-size="20" font-weight="bold">35% <tspan font-size="11" fill="#64748b">ZONE B</tspan></text>
  <text x="28" y="570" fill="#f59e0b" font-family="monospace" font-size="8">WATERLOGGED &gt;72 HRS</text>
</svg>
