  <line x1="0"   y1="258" x2="800" y2="258" stroke="#143050" stroke-width="0.8"/>

  <!-- County/state boundaries -->
  <g stroke="#1e3a55" stroke-width="0.9" fill="none">
    <polyline points="90,140 175,132 265,128 365,134 465,142 545,155 585,192"/>
    <polyline points="90,295 182,286 305,277 435,282 562,295 605,322"/>
