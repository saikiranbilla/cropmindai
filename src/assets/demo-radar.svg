  <rect x="700" y="89" width="22" height="11" fill="#1d4ed8"/><text x="726" y="99"  fill="#64748b" font-family="monospace" font-size="7">20</text>
  <rect x="700" y="100" width="22" height="11" fill="#0284c7"/><text x="726" y="110" fill="#64748b" font-family="monospace" font-size="7">25</text>
  <rect x="700" y="111" width="22" height="11" fill="#06b6d4"/><text x="726" y="121" fill="#64748b" font-family="monospace" font-size="7">30</text>
  <rect x="700" y="122" width="22" height="11" fill="#10b981"/><text x="726" y="132" fill="#64748b" font-family="monospace" font-size="7">35</text>
  <rect x="700" y="133" width="22" height="11" fill="#84cc16"/><text x="726" y="143" fill="#64748b" font-family="monospace" font-size="7">40</text>
  <rect x="700" y="144" width="22" height="11" fill="#eab308"/><text x="726" y="154" fill="#64748b" font-family="monospace" font-size="7">45</text>
  <rect x="700" y="155" width="22" height="11" fill="#f97316"/><text x="726" y="165" fill="#64748b" font-family="monospace" font-size="7">50</text>
  <rect x="700" y="166" width="22" height="11" fill="#ef4444"/><text x="726" y="176" fill="#64748b" font-family="monospace" font-size="7">55+</text>

  <!-- Scale bar -->
  <line x1="42" y1="456" x2="122" y2="456" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="42" y1="452" x2="42"  y2="460" stroke="#4ade80" stroke-width="1.5"/>
  <line x1="122" y1="452" x2="122" y2="460" stroke="#4ade80" stroke-width="1.5"/>
  <text x="82" y="471" fill="#4ade80" font-family="monospace" font-size="8" text-anchor="middle">50 km</text>

