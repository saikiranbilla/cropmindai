  <ellipse cx="372" cy="226" rx="106" ry="68"  fill="rgba(37,99,235,0.40)"  transform="rotate(-14 372 226)"/>
  <ellipse cx="360" cy="218" rx="65"  ry="41"  fill="rgba(6,182,212,0.52)"  transform="rotate(-18 360 218)"/>
  <ellipse cx="348" cy="212" rx="36"  ry="24"  fill="rgba(16,185,129,0.64)"/>
  <ellipse cx="340" cy="207" rx="18"  ry="12"  fill="rgba(234,179,8,0.76)"/>
  <ellipse cx="334" cy="204" rx="9"   ry="7"   fill="rgba(249,115,22,0.87)"/>
  <ellipse cx="330" cy="202" rx="4"   ry="4"   fill="rgba(239,68,68,0.94)"/>

  <!-- Second weaker cell SE -->
  <ellipse cx="468" cy="308" rx="46" ry="32" fill="rgba(37,99,235,0.30)" transform="rotate(8 468 308)"/>
  <ellipse cx="462" cy="303" rx="24" ry="16" fill="rgba(6,182,212,0.44)"/>
  <ellipse cx="458" cy="300" rx="11" ry="8"  fill="rgba(16,185,129,0.54)"/>

