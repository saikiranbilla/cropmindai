    <line x1="0" y1="96" x2="800" y2="96"/>
    <line x1="0" y1="192" x2="800" y2="192"/>
    <line x1="0" y1="288" x2="800" y2="288"/>
    <line x1="0" y1="384" x2="800" y2="384"/>
    <line x1="160" y1="0" x2="160" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="480"/>
    <line x1="480" y1="0" x2="480" y2="480"/>
    <line x1="640" y1="0" x2="640" y2="480"/>
  </g>

  <!-- Range rings -->
  <circle cx="310" cy="258" r="68"  fill="none" stroke="#143050" stroke-width="1"/>
  <circle cx="310" cy="258" r="136" fill="none" stroke="#143050" stroke-width="1"/>
  <circle cx="310" cy="258" r="204" fill="none" stroke="#143050" stroke-width="1"/>
  <circle cx="310" cy="258" r="272" fill="none" stroke="#143050" stroke-width="1"/>

