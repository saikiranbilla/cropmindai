  <line x1="376" y1="230" x2="376" y2="204" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="316" y="191" width="122" height="12" fill="rgba(0,0,0,0.65)" rx="2"/>
  <text x="377" y="201" fill="#ef4444" font-family="monospace" font-size="9" text-anchor="middle">CHAMPAIGN CO, IL</text>

