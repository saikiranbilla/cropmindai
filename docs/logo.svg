<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>

    <!-- Green accent gradient (crop/nature) -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <!-- Blue accent gradient (water/flood) -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <!-- Teal gradient for the shield -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="50%" stop-color="#0d9488"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle outer glow -->
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#14b8a6" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feComposite in="SourceGraphic"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="200" cy="200" r="190" fill="url(#bgGrad)" stroke="#27272a" stroke-width="2"/>

  <!-- Subtle grid lines (digital/tech feel) -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="0.5">
    <line x1="50" y1="120" x2="350" y2="120"/>
    <line x1="50" y1="160" x2="350" y2="160"/>
    <line x1="50" y1="200" x2="350" y2="200"/>
    <line x1="50" y1="240" x2="350" y2="240"/>
    <line x1="50" y1="280" x2="350" y2="280"/>
    <line x1="120" y1="50" x2="120" y2="350"/>
    <line x1="160" y1="50" x2="160" y2="350"/>
    <line x1="200" y1="50" x2="200" y2="350"/>
    <line x1="240" y1="50" x2="240" y2="350"/>
    <line x1="280" y1="50" x2="280" y2="350"/>
  </g>

  <!-- Shield shape (insurance/protection) -->
  <path d="M200 75 L290 120 L290 220 C290 280 200 330 200 330 C200 330 110 280 110 220 L110 120 Z"
        fill="none" stroke="url(#shieldGrad)" stroke-width="3" opacity="0.7" filter="url(#outerGlow)"/>

  <!-- Inner shield fill -->
  <path d="M200 85 L280 125 L280 215 C280 270 200 315 200 315 C200 315 120 270 120 215 L120 125 Z"
        fill="url(#shieldGrad)" opacity="0.08"/>

  <!-- Crop/Leaf icon (left side - representing agriculture) -->
  <g transform="translate(200, 185)" filter="url(#glow)">
    <!-- Main stem -->
    <line x1="0" y1="60" x2="0" y2="-20" stroke="url(#greenGrad)" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Left leaf -->
    <path d="M0 20 C-15 10 -40 15 -45 0 C-35 -5 -15 -5 0 10"
          fill="url(#greenGrad)" opacity="0.9"/>

    <!-- Right leaf -->
    <path d="M0 5 C15 -5 40 0 45 -15 C35 -20 15 -15 0 -5"
          fill="url(#greenGrad)" opacity="0.9"/>

    <!-- Small top leaf -->
    <path d="M0 -10 C-8 -20 -20 -25 -25 -35 C-15 -35 -5 -28 0 -20"
          fill="#22c55e" opacity="0.8"/>
  </g>

  <!-- Water/flood waves (bottom of shield) -->
  <g transform="translate(200, 260)" opacity="0.8">
    <path d="M-60 0 C-45 -10 -30 10 -15 0 C0 -10 15 10 30 0 C45 -10 60 10 75 0"
          fill="none" stroke="url(#blueGrad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-70 12 C-55 2 -40 22 -25 12 C-10 2 5 22 20 12 C35 2 50 22 65 12"
          fill="none" stroke="url(#blueGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M-55 24 C-40 14 -25 34 -10 24 C5 14 20 34 35 24 C50 14 65 34 80 24"
          fill="none" stroke="url(#blueGrad)" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Circuit/AI nodes (representing technology) -->
  <g opacity="0.5">
    <!-- Top-left node cluster -->
    <circle cx="135" cy="135" r="3" fill="#14b8a6"/>
    <circle cx="155" cy="115" r="2" fill="#14b8a6"/>
    <line x1="135" y1="135" x2="155" y2="115" stroke="#14b8a6" stroke-width="1" opacity="0.6"/>
    <line x1="155" y1="115" x2="175" y2="125" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>

    <!-- Top-right node cluster -->
    <circle cx="265" cy="135" r="3" fill="#14b8a6"/>
    <circle cx="245" cy="115" r="2" fill="#14b8a6"/>
    <line x1="265" y1="135" x2="245" y2="115" stroke="#14b8a6" stroke-width="1" opacity="0.6"/>
    <line x1="245" y1="115" x2="225" y2="125" stroke="#14b8a6" stroke-width="1" opacity="0.4"/>

    <!-- Side nodes -->
    <circle cx="120" cy="190" r="2.5" fill="#3b82f6"/>
    <line x1="120" y1="190" x2="135" y2="175" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

    <circle cx="280" cy="190" r="2.5" fill="#3b82f6"/>
    <line x1="280" y1="190" x2="265" y2="175" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Scanning/analysis lines (AI assessment feel) -->
  <g opacity="0.15">
    <line x1="140" y1="165" x2="260" y2="165" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="145" y1="195" x2="255" y2="195" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4"/>
    <line x1="150" y1="225" x2="250" y2="225" stroke="#14b8a6" stroke-width="1" stroke-dasharray="4,4"/>
  </g>

  <!-- "CM" monogram (CropMIND) -->
  <text x="200" y="155" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif"
        font-size="28" font-weight="700" letter-spacing="6" fill="#ffffff" opacity="0.9">CM</text>

  <!-- "AI" badge -->
  <rect x="183" y="290" width="34" height="18" rx="9" fill="url(#shieldGrad)" opacity="0.9"/>
  <text x="200" y="303" text-anchor="middle" font-family="'Inter', 'SF Pro Display', -apple-system, sans-serif"
        font-size="11" font-weight="700" fill="#ffffff" letter-spacing="2">AI</text>

  <!-- Outer ring accent -->
  <circle cx="200" cy="200" r="188" fill="none" stroke="url(#shieldGrad)" stroke-width="1" opacity="0.2"
          stroke-dasharray="8,12"/>
</svg>
